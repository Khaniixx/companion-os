name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  desktop-frontend:
    name: Desktop Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm ci
        working-directory: apps/desktop

      - name: Lint desktop frontend
        run: npm run lint
        working-directory: apps/desktop

      - name: Test desktop frontend
        run: npm run test -- --run
        working-directory: apps/desktop

      - name: Build desktop frontend
        run: npm run build
        working-directory: apps/desktop

  runtime:
    name: Agent Runtime
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.create false
          poetry install --with dev --no-interaction --no-root
        working-directory: services/agent-runtime

      - name: Run runtime tests
        run: python -m pytest -q
        working-directory: services/agent-runtime

      - name: Validate runtime imports
        run: python -m compileall app tests
        working-directory: services/agent-runtime

  desktop-rust:
    name: Desktop Rust Metadata
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve desktop cargo metadata
        run: cargo metadata --manifest-path apps/desktop/src-tauri/Cargo.toml --locked --format-version 1
