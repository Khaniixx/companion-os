name: CodeQL

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: JavaScript / TypeScript
            language: javascript-typescript
            os: ubuntu-latest
          - name: Python
            language: python
            os: ubuntu-latest
          - name: Rust
            language: rust
            os: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Install desktop dependencies
        if: matrix.language == 'javascript-typescript'
        run: npm ci
        working-directory: apps/desktop

      - name: Build desktop frontend
        if: matrix.language == 'javascript-typescript'
        run: npm run build
        working-directory: apps/desktop

      - name: Install runtime dependencies
        if: matrix.language == 'python'
        run: |
          python -m pip install --upgrade pip poetry
          poetry install --no-interaction
        working-directory: services/agent-runtime

      - name: Validate runtime imports
        if: matrix.language == 'python'
        run: poetry run python -m compileall app tests
        working-directory: services/agent-runtime

      - name: Resolve desktop cargo metadata
        if: matrix.language == 'rust'
        run: cargo metadata --manifest-path apps/desktop/src-tauri/Cargo.toml --locked --format-version 1

      - name: Check desktop Rust crate
        if: matrix.language == 'rust'
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --locked

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
